<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎂</title>

<!-- 🎆 พลุ -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Prompt", sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  color: #fff;
}

/* 🔐 หน้าใส่รหัส */
#lockScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

input {
  padding: 10px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ff6b81;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #ff4757;
}

/* 🎂 การ์ดวันเกิด */
#birthdayCard {
  display: none;
  padding: 50px 20px;
}

.card2 {
  background: #ffc0cb;
  padding: 40px;
  border-radius: 25px;
  margin: 20px auto;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.cake {
  font-size: 60px;
  animation: bounce 1s infinite;
}

.happyText {
  font-size: 2em;
  color: #c2185b;
  text-shadow: 2px 2px 5px rgba(255,255,255,0.7);
}

/* 🎁 กล่องข้อความ */
.card {
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 20px;
  margin-top: 20px;
}

/* 🖼️ รูป */
img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  object-position: center;
  border-radius: 15px;
  margin-top: 10px;
  display: block;
}

@keyframes bounce {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}
</style>
</head>

<body>

<!-- 🔐 ใส่รหัส -->
<div id="lockScreen">
  <h2>🔒 ใส่รหัสก่อนเข้า</h2>
  <input type="password" id="password" placeholder="ใส่รหัส">
  <button onclick="checkPassword()">เข้าสู่เซอร์ไพรส์</button>
</div>

<!-- 🎂 หน้าเซอร์ไพรส์ -->
<div id="birthdayCard">
  <div class="card2">
    <div class="cake">🎂</div>
    <h1 class="happyText">Happy Birthday 💖</h1>
  </div>

  <div class="card">
    <p id="message">ขอให้มีความสุขมาก ๆ นะ 💕</p>
    <button onclick="changeMessage()">เปลี่ยนคำอวยพร</button>
  </div>

  <div class="card">
    <p>ความทรงจำของเรา 📸</p>
    <img src="img001.jpeg">
  </div>
</div>

<!-- 🎵 เพลง -->
<audio id="music" loop>
  <source src="song2.mp3">
</audio>

<script>
// 🎆 พลุ
function launchConfetti() {
  confetti({
    particleCount: 120,
    spread: 70,
    origin: { y: 0.6 }
  });
}

// 🔐 เช็ครหัส
function checkPassword() {
  const pass = document.getElementById("password").value;

  if(pass === "1234") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("birthdayCard").style.display = "block";

    document.getElementById("music").play();

    // 🎉 พลุตอนเข้า
    launchConfetti();
  } else {
    alert("รหัสไม่ถูกต้อง!");
  }
}

// 💬 เปลี่ยนคำอวยพร
function changeMessage() {
  const messages = [
    "สุขสันต์วันเกิดนะพี่บอล 🎂",
    "ขอให้สมหวังทุกอย่าง 🎁",
    "อยู่ด้วยกันไปนาน ๆ 💖",
    "รักนะเว้ย 💕"
  ];

  const random = Math.floor(Math.random() * messages.length);
  document.getElementById("message").innerText = messages[random];

  // 🎉 พลุตอนกด
  launchConfetti();
}
</script>

</body>
</html>
