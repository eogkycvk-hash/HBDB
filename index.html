<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎂</title>

<!-- 🎆 โหลด confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  font-family: "Prompt", sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  color: #fff;
}

/* หน้าใส่รหัส */
#lockScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

input {
  padding: 10px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ff6b81;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #ff4757;
}

/* หน้าเซอร์ไพรส์ */
#mainContent {
  display: none;
  padding: 50px 20px;
}

.card {
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 20px;
  margin: 20px auto;
  max-width: 400px;
  backdrop-filter: blur(10px);
}

/* 🖼️ ปรับรูปให้พอดี */
img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 15px;
}
</style>

</head>
<body>

<!-- 🔐 หน้าใส่รหัส -->
<div id="lockScreen">
  <h2>🔒 ใส่รหัสก่อนเข้า</h2>
  <input type="password" id="password" placeholder="ใส่รหัส">
  <br>
  <button onclick="checkPassword()">เข้าสู่เซอร์ไพรส์</button>
</div>

<!-- 🎉 หน้าเซอร์ไพรส์ -->
<div id="mainContent">
  <h1>🎉 Happy Birthday! 🎂</h1>

  <div class="card">
    <p id="message">ขอให้มีความสุขมาก ๆ นะ 💖</p>
    <button onclick="changeMessage()">เปลี่ยนคำอวยพร</button>
  </div>

  <div class="card">
    <p>ความทรงจำของเรา 📸</p>
    <img src="img001.jpeg">
  </div>
</div>

<!-- 🎵 เพลง -->
<audio id="music" loop>
  <source src="song2.mp3" type="audio/mpeg">
</audio>

<script>
// 🎆 ฟังก์ชันยิงพลุ
function launchConfetti() {
  confetti({
    particleCount: 120,
    spread: 70,
    origin: { y: 0.6 }
  });
}

function checkPassword() {
  const pass = document.getElementById("password").value;

  if(pass === "1234") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";

    document.getElementById("music").play();

    // 🎉 ยิงพลุตอนเข้าถูก
    launchConfetti();
  } else {
    alert("รหัสไม่ถูกต้อง!");
  }
}

function changeMessage() {
  const messages = [
    "สุขสันต์วันเกิดนะพี่บอล 🎂",
    "ขอให้สมหวังทุกอย่าง 🎁",
    "อยู่ด้วยกันแบบนี้ไปนาน ๆ 💖",
    "รักนะเว้ย 💕"
  ];

  const random = Math.floor(Math.random() * messages.length);
  document.getElementById("message").innerText = messages[random];

  // 🎉 ยิงพลุตอนกดปุ่ม
  launchConfetti();
}
</script>

</body>
</html>
